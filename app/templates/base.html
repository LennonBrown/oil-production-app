<!-- app/templates/base.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Oil Production App{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <nav>
        <a href="{{ url_for('main.index') }}">Home</a>
        <a href="{{ url_for('main.regions') }}">Regions</a>
        <a href="{{ url_for('main.compare') }}">Compare</a>
        <a href="{{ url_for('main.analysis') }}">Analysis</a>
    </nav>

    <main>
        {% block content %}
        {% endblock %}
    </main>

    <footer>
        <p>Data source: U.S. Energy Information Administration (EIA)</p>
    </footer>

    {% block scripts %}{% endblock %}

</body>
</html>
